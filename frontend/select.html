<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問題選択 - ビザ検定</title>
  <link rel="stylesheet" href="/assets/style.css?v=1.12.0">
</head>
<body>
  <div class="app-shell">
    <header class="header">
      <div class="header-main">
        <h1>ビザ検定</h1>
        <p class="subtitle">問題選択</p>
      </div>
    </header>

    <div id="loading" class="loading">読み込み中…</div>

    <div id="content" style="display:none;">
      <section class="pick">
        <div class="pick-head">
          <span class="pick-step">1</span>
          <h2 class="pick-title">単元を選ぶ</h2>
          <span class="pick-chosen" id="unit-chosen"></span>
        </div>
        <div class="pick-body" id="unit-list"></div>
      </section>

      <section class="pick" id="level-section">
        <div class="pick-head">
          <span class="pick-step">2</span>
          <h2 class="pick-title">難易度を選ぶ</h2>
          <span class="pick-chosen" id="level-chosen"></span>
        </div>
        <div class="pick-body" id="level-list">
          <p class="pick-hint">先に単元を選んでください</p>
        </div>
      </section>

      <div class="pick-start">
        <button type="button" id="start-btn" class="btn btn-primary pick-start-btn" disabled>検定を開始</button>
        <span id="start-hint" class="muted"></span>
      </div>
    </div>

    <div id="error-area" class="card" style="display:none;">
      <h2>エラー</h2>
      <p id="error-message"></p>
    </div>
  </div>

  <script src="/assets/common.js?v=1.12.0"></script>
  <script>
    const loadingEl = document.getElementById("loading");
    const contentEl = document.getElementById("content");
    const unitListEl = document.getElementById("unit-list");
    const levelListEl = document.getElementById("level-list");
    const levelSection = document.getElementById("level-section");
    const unitChosenEl = document.getElementById("unit-chosen");
    const levelChosenEl = document.getElementById("level-chosen");
    const startBtn = document.getElementById("start-btn");
    const startHint = document.getElementById("start-hint");

    let units = [];
    let availableLevels = [];
    let selectedUnit = null;
    let selectedLevel = null;
    let progressByLevel = {};

    async function init() {
      const me = await requireLogin();
      if (!me) return;
      mountHeaderNav("select");
      try {
        await loadCells();
        renderUnits();
        loadingEl.style.display = "none";
        contentEl.style.display = "block";
      } catch (e) {
        showError(e.message || "読み込みに失敗しました");
      }
    }

    function showError(msg) {
      loadingEl.style.display = "none";
      document.getElementById("error-area").style.display = "block";
      document.getElementById("error-message").textContent = msg;
    }

    async function loadCells() {
      const res = await fetch("/api/rag/cells");
      if (res.status === 401) { location.href = "/"; return; }
      if (!res.ok) throw new Error("データの取得に失敗しました");
      const data = await res.json();
      const cells = data.cells || [];
      const seen = new Set();
      units = [];
      for (const c of cells) {
        if (!seen.has(c.unit_id)) {
          seen.add(c.unit_id);
          units.push({ id: c.unit_id, name: c.unit_name });
        }
      }
      const lv = new Set(cells.map((c) => c.level));
      availableLevels = LEVELS.filter((l) => lv.has(l));
      if (!availableLevels.length) availableLevels = LEVELS.slice();
    }

    function renderUnits() {
      unitListEl.innerHTML = units.map((u, i) => `
        <button type="button" class="opt opt--unit" data-unit="${u.id}">
          <span class="opt-idx">${String(i + 1).padStart(2, "0")}</span>
          <span class="opt-name">${escapeHtml(u.name)}</span>
          <span class="opt-check" aria-hidden="true">&#10003;</span>
        </button>`).join("");
      unitListEl.querySelectorAll(".opt").forEach((btn) => {
        btn.addEventListener("click", () => selectUnit(btn.dataset.unit));
      });
    }

    async function selectUnit(unitId) {
      selectedUnit = unitId;
      selectedLevel = null;
      unitListEl.querySelectorAll(".opt").forEach((b) => {
        b.classList.toggle("is-selected", b.dataset.unit === unitId);
      });
      const u = units.find((x) => x.id === unitId);
      unitChosenEl.textContent = u ? u.name : "";
      levelChosenEl.textContent = "";
      levelSection.classList.add("is-active");
      await ensureProgressForLevels();
      renderLevels();
      updateStart();
      levelSection.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    async function ensureProgressForLevels() {
      await Promise.all(availableLevels.map(async (level) => {
        if (progressByLevel[level]) return;
        try {
          const res = await fetch(`/api/rag/units?level=${encodeURIComponent(level)}`);
          if (!res.ok) return;
          const data = await res.json();
          const map = {};
          (data.units || []).forEach((u) => { map[u.id] = u; });
          progressByLevel[level] = map;
        } catch (_) {}
      }));
    }

    function renderLevels() {
      levelListEl.innerHTML = availableLevels.map((l) => {
        const u = (progressByLevel[l] || {})[selectedUnit] || {};
        const status = u.cleared
          ? '<span class="lvl-status lvl-status--done">クリア済み</span>'
          : (u.required_streak
              ? `<span class="lvl-status">あと ${Math.max(0, (u.required_streak || 0) - (u.perfect_count || 0))} 回でクリア</span>`
              : "");
        return `
          <button type="button" class="opt opt--level" data-level="${l}">
            <span class="opt-name">${levelLabel(l)}</span>
            ${status}
            <span class="opt-check" aria-hidden="true">&#10003;</span>
          </button>`;
      }).join("");
      levelListEl.querySelectorAll(".opt").forEach((btn) => {
        btn.addEventListener("click", () => selectLevel(btn.dataset.level));
      });
    }

    function selectLevel(level) {
      selectedLevel = level;
      levelListEl.querySelectorAll(".opt").forEach((b) => {
        b.classList.toggle("is-selected", b.dataset.level === level);
      });
      levelChosenEl.textContent = levelLabel(level);
      updateStart();
    }

    function updateStart() {
      const ready = selectedUnit && selectedLevel;
      startBtn.disabled = !ready;
      if (ready) {
        const u = units.find((x) => x.id === selectedUnit);
        startHint.textContent = `${u ? u.name : ""}・${levelLabel(selectedLevel)}`;
      } else if (selectedUnit) {
        startHint.textContent = "難易度を選んでください";
      } else {
        startHint.textContent = "";
      }
    }

    startBtn.addEventListener("click", () => {
      if (!selectedUnit || !selectedLevel) return;
      const p = new URLSearchParams({ level: selectedLevel, unit: selectedUnit });
      location.href = `/quiz.html?${p.toString()}`;
    });

    init();
  </script>
<footer style="display: flex; padding: 8px; font-size: 12px; border-top: 1px solid #eee;"></footer>
</body>
</html>
