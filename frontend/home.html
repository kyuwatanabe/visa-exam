<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホーム - ビザ検定</title>
  <link rel="stylesheet" href="/assets/style.css?v=1.12.2">
</head>
<body>
  <div class="app-shell">
    <header class="header">
      <div class="header-main">
        <h1>ビザ検定</h1>
        <p class="subtitle">ホーム</p>
      </div>
    </header>

    <div id="loading" class="loading">読み込み中…</div>

    <div id="content" style="display: none;">
      <!-- プロフィール（常時表示） -->
      <section class="card">
        <div id="profile-name" style="font-size: 18px; font-weight: 600;"></div>
        <div id="profile-email" class="muted"></div>
      </section>

      <!-- タブ -->
      <div class="tabs" id="tabs">
        <button type="button" class="tab active" data-tab="progress">単元別進捗</button>
        <button type="button" class="tab" data-tab="history">受験履歴</button>
        <button type="button" class="tab" data-tab="challenges">チャレンジ</button>
        <button type="button" class="tab" data-tab="settings">設定</button>
      </div>

      <!-- 単元別進捗 -->
      <section class="card tab-panel" id="panel-progress">
        <h2>単元別進捗</h2>
        <div id="progress-area"><div class="loading">読み込み中…</div></div>
      </section>

      <!-- 受験履歴 -->
      <section class="card tab-panel" id="panel-history" hidden>
        <h2>受験履歴</h2>
        <div id="history-area"><div class="loading">読み込み中…</div></div>
      </section>

      <!-- チャレンジ -->
      <section class="card tab-panel" id="panel-challenges" hidden>
        <h2>チャレンジ</h2>
        <div id="challenges-area"><div class="loading">読み込み中…</div></div>
      </section>

      <!-- 設定 -->
      <section class="card tab-panel" id="panel-settings" hidden>
        <h2>設定</h2>

        <h3 style="margin: 4px 0 8px;">メールアドレスの変更</h3>
        <label for="email-new">新しいメールアドレス</label>
        <input type="email" id="email-new" maxlength="254" autocomplete="email">
        <label for="email-pw" style="margin-top: 8px; display: block;">現在のパスワード（確認）</label>
        <input type="password" id="email-pw" maxlength="128" autocomplete="current-password">
        <p class="muted" id="email-msg" style="margin-top: 8px;" hidden></p>
        <button type="button" class="btn" id="email-submit" style="margin-top: 12px;">メールアドレスを変更</button>

        <hr style="margin: 24px 0; border: none; border-top: 1px solid var(--border);">

        <h3 style="margin: 4px 0 8px;">パスワードの再設定</h3>
        <label for="pw-current">現在のパスワード</label>
        <input type="password" id="pw-current" maxlength="128" autocomplete="current-password">
        <label for="pw-new" style="margin-top: 8px; display: block;">新しいパスワード（8文字以上）</label>
        <input type="password" id="pw-new" maxlength="128" autocomplete="new-password">
        <p class="muted" id="pw-msg" style="margin-top: 8px;" hidden></p>
        <button type="button" class="btn" id="pw-submit" style="margin-top: 12px;">パスワードを変更</button>
      </section>
    </div>
  </div>

  <script src="/assets/common.js?v=1.12.2"></script>
  <script>
    // LEVELS / requireLogin / mountHeaderNav / levelLabel / fmtDate / pillClass は common.js

    let challengeItems = [];
    let openUnitKeys = new Set();    // 未処理チャレンジのある "level:unit_id"
    let openAttemptIds = new Set();  // 未処理チャレンジのある受験ID

    async function init() {
      const me = await requireLogin();
      if (!me) return;
      mountHeaderNav("home");
      document.getElementById("profile-name").textContent = `${me.display_name} さん`;
      document.getElementById("profile-email").textContent = me.email;
      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "block";
      setupTabs();
      await loadChallengesData();   // 暫定判定の元データを先に取る
      loadProgress();
      loadHistory();
      renderChallenges();
    }

    // --- タブ切替 ---
    function setupTabs() {
      const tabs = document.querySelectorAll("#tabs .tab");
      tabs.forEach((btn) => {
        btn.addEventListener("click", () => {
          tabs.forEach((b) => b.classList.toggle("active", b === btn));
          document.querySelectorAll(".tab-panel").forEach((p) => {
            p.hidden = p.id !== `panel-${btn.dataset.tab}`;
          });
        });
      });
    }

    // --- チャレンジ元データ（暫定判定に使う集合も作る） ---
    async function loadChallengesData() {
      try {
        const res = await fetch("/api/my/challenges");
        const data = await res.json();
        challengeItems = data.challenges || [];
      } catch (e) {
        challengeItems = [];
      }
      const open = challengeItems.filter((c) => c.status === "open");
      openUnitKeys = new Set(open.map((c) => `${c.level}:${c.unit_id}`));
      openAttemptIds = new Set(open.filter((c) => c.attempt_id != null).map((c) => c.attempt_id));
    }

    // --- 単元別進捗（単元×級のマトリクス。未処理チャレンジのある単元は印） ---
    async function loadProgress() {
      const area = document.getElementById("progress-area");
      try {
        const levels = [];
        const byUnit = {};      // unit_id -> {name, cells:{level->u}}
        const unitOrder = [];
        for (const level of LEVELS) {
          const res = await fetch(`/api/rag/units?level=${level}`);
          if (!res.ok) continue;
          const data = await res.json();
          levels.push(level);
          (data.units || []).forEach((u) => {
            if (!byUnit[u.id]) { byUnit[u.id] = { name: u.name, cells: {} }; unitOrder.push(u.id); }
            byUnit[u.id].cells[level] = u;
          });
        }
        if (!unitOrder.length) {
          area.innerHTML = '<div class="empty">進捗はまだありません</div>';
          return;
        }
        const head = `<tr><th>単元</th>${levels.map((l) => `<th>${levelLabel(l)}</th>`).join("")}</tr>`;
        const rows = unitOrder.map((uid) => {
          const row = byUnit[uid];
          const pending = levels.some((l) => openUnitKeys.has(`${l}:${uid}`));
          const mark = pending ? ' <span class="pending-tag">確認中</span>' : "";
          const tds = levels.map((l) => {
            const u = row.cells[l];
            if (!u) return '<td class="pcell">−</td>';
            const n = u.attempt_count || 0;
            const cnt = `<span class="pcount">受験${n}回</span>`;
            if (u.cleared) return `<td class="pcell"><span class="pstat pstat--done">クリア</span>${cnt}</td>`;
            if ((u.perfect_count || 0) > 0)
              return `<td class="pcell"><span class="pstat pstat--prog">${u.perfect_count}/${u.required_streak}</span>${cnt}</td>`;
            return `<td class="pcell"><span class="pstat pstat--none">未達 0/${u.required_streak}</span>${cnt}</td>`;
          }).join("");
          return `<tr><td class="pcell-unit">${escapeHtml(row.name)}${mark}</td>${tds}</tr>`;
        }).join("");
        area.innerHTML = `
          <table class="data progress-matrix">
            <thead>${head}</thead>
            <tbody>${rows}</tbody>
          </table>
          <p class="muted" style="font-size:12px; margin:8px 0 0;">
            <span class="pstat pstat--done">クリア</span> 必要回数の満点到達　
            <span class="pstat pstat--prog">n/m</span> 満点n回（必要m回）　
            <span class="pstat pstat--none">未達</span> 満点なし
          </p>`;
      } catch (e) {
        area.innerHTML = '<div class="empty">進捗の取得に失敗しました</div>';
      }
    }

    // --- 受験履歴（未処理チャレンジのある回は「暫定」） ---
    async function loadHistory() {
      const area = document.getElementById("history-area");
      try {
        const res = await fetch("/api/history");
        if (!res.ok) throw new Error();
        const data = await res.json();
        const attempts = data.attempts || [];
        if (attempts.length === 0) {
          area.innerHTML = '<div class="empty">受験履歴はまだありません</div>';
          return;
        }
        const rows = attempts.map((a) => {
          const pct = a.total ? Math.round((a.score * 100) / a.total) : 0;
          const pending = openAttemptIds.has(a.id);
          const cls = pending ? ' class="row-pending"' : "";
          const mark = pending ? ' <span class="pending-tag">暫定</span>' : "";
          const kind = a.unit_name ? escapeHtml(a.unit_name) : "−";
          return `<tr${cls}>
            <td>${fmtDate(a.taken_at)}${mark}</td>
            <td>${kind}</td>
            <td>${levelLabel(a.level)}</td>
            <td><span class="score-pill ${pillClass(pct)}">${a.score} / ${a.total}</span></td>
          </tr>`;
        }).join("");
        area.innerHTML = `
          <table class="data">
            <thead><tr><th>受験日時</th><th>単元</th><th>レベル</th><th>得点</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>`;
      } catch (e) {
        area.innerHTML = '<div class="empty">履歴の取得に失敗しました</div>';
      }
    }

    // --- チャレンジ一覧（状態は容認／却下／確認中の利用者向け表示） ---
    function userStatusClass(st) {
      if (st === "rejected") return "rejected";
      if (st === "open") return "open";
      return "accepted";  // accepted / closed はどちらも「容認」
    }
    function renderChallenges() {
      const area = document.getElementById("challenges-area");
      if (challengeItems.length === 0) {
        area.innerHTML = '<div class="empty">チャレンジはまだありません</div>';
        return;
      }
      const rows = challengeItems.map((ch) => {
        const status = `<span class="ch-status ch-status--${userStatusClass(ch.status)}">${escapeHtml(ch.status_label || ch.status)}</span>`;
        const msg = ch.admin_message
          ? `<div class="muted" style="margin-top:4px;">管理者より：${escapeHtml(ch.admin_message)}</div>`
          : "";
        const reason = ch.reason
          ? `<div class="muted" style="font-size:11px;">理由：${escapeHtml(ch.reason)}</div>`
          : "";
        return `<tr>
          <td>${fmtDate(ch.created_at)}</td>
          <td>${escapeHtml(ch.question || "")}${reason}</td>
          <td>${status}${msg}</td>
        </tr>`;
      }).join("");
      area.innerHTML = `
        <table class="data">
          <thead><tr><th>申し立て日時</th><th>設問 / 理由</th><th>状態 / 返信</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    // --- メールアドレス変更 ---
    document.getElementById("email-submit").addEventListener("click", async () => {
      const msg = document.getElementById("email-msg");
      msg.hidden = true;
      try {
        const res = await fetch("/api/auth/email", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            new_email: document.getElementById("email-new").value.trim(),
            current_password: document.getElementById("email-pw").value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "変更に失敗しました");
        document.getElementById("profile-email").textContent = data.email;
        document.getElementById("email-new").value = "";
        document.getElementById("email-pw").value = "";
        msg.textContent = "メールアドレスを変更しました。";
        msg.style.color = "var(--success)";
        msg.hidden = false;
      } catch (e) {
        msg.textContent = e.message;
        msg.style.color = "var(--danger)";
        msg.hidden = false;
      }
    });

    // --- パスワード変更 ---
    document.getElementById("pw-submit").addEventListener("click", async () => {
      const msg = document.getElementById("pw-msg");
      msg.hidden = true;
      try {
        const res = await fetch("/api/auth/password", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            current_password: document.getElementById("pw-current").value,
            new_password: document.getElementById("pw-new").value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "変更に失敗しました");
        alert("パスワードを変更しました。新しいパスワードで再ログインしてください。");
        location.href = "/";
      } catch (e) {
        msg.textContent = e.message;
        msg.style.color = "var(--danger)";
        msg.hidden = false;
      }
    });

    init();
  </script>
<footer style="display: flex; padding: 8px; font-size: 12px; border-top: 1px solid #eee;"></footer>
</body>
</html>
