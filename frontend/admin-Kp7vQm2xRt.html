<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>ビザ検定 - 管理画面</title>
  <link rel="stylesheet" href="/assets/style.css?v=1.12.1">
</head>
<body>
  <div class="app-shell app-shell--wide">
    <header class="header">
      <div>
        <h1>ビザ検定 - 管理画面</h1>
        <p id="app-version-slot" style="font-size:12px; color:#999; margin:0;"></p>
      </div>
    </header>

    <!-- メニュー -->
    <nav class="admin-nav" id="admin-nav">
      <button type="button" class="admin-nav-btn is-active" data-view="users">受験者一覧</button>
      <button type="button" class="admin-nav-btn" data-view="source">ソース管理</button>
      <button type="button" class="admin-nav-btn" data-view="challenges">
        チャレンジ対応
        <span id="inbox-badge" class="inbox-badge" hidden>0</span>
      </button>
      <button type="button" class="admin-nav-btn" data-view="prompts">プロンプト修正</button>
    </nav>

    <div id="loading" class="loading">読み込み中…</div>

    <main id="content" style="display:none;">
      <!-- 受験者一覧 -->
      <section class="card admin-view" id="view-users">
        <h2>受験者一覧</h2>
        <div id="users-area"></div>
      </section>

      <!-- 個人の記録（一覧から受験者を選ぶと表示。一覧とは別画面） -->
      <section class="admin-view" id="view-user-detail" style="display:none;">
        <button type="button" id="detail-back" class="btn btn-secondary" style="margin-bottom:12px;">← 受験者一覧に戻る</button>
        <div class="card">
          <h2 id="history-title">受験者の記録</h2>
          <div id="history-area"></div>
        </div>
      </section>

      <!-- ソース管理 -->
      <section class="card admin-view" id="view-source" style="display:none;">
        <h2>ソース管理</h2>
        <div style="display:flex; flex-direction:column; gap:16px;">
          <div>
            <h3 style="margin-top:0;">PDF をアップロード</h3>
            <p style="font-size:13px; color:#666; margin:8px 0;">PDF ファイルをアップロードすると、自動的にテキストに変換されます。</p>
            <div style="display:flex; gap:12px; align-items:flex-start;">
              <input type="file" id="pdf-input" accept=".pdf" style="flex:1;">
              <button type="button" id="upload-btn" class="btn btn-primary" style="padding:8px 16px;">アップロード</button>
            </div>
            <div id="upload-status" style="margin-top:8px; font-size:13px;"></div>
          </div>
          <hr style="margin:0; border:none; border-top:1px solid #e0e0e0;">
          <div>
            <h3 style="margin-top:0;">保存されているファイル</h3>
            <div id="files-list" style="display:flex; flex-direction:column; gap:8px;">
              <div class="loading" style="font-size:13px;">読み込み中…</div>
            </div>
          </div>
        </div>
      </section>

      <!-- チャレンジ対応 -->
      <section class="card admin-view" id="view-challenges" style="display:none;">
        <div class="ch-modal-head">
          <h2 style="margin:0;">チャレンジ対応</h2>
          <label class="muted" style="font-size:13px;">状態:
            <select id="challenge-status-filter">
              <option value="">すべて</option>
              <option value="open">未処理</option>
              <option value="accepted">処理済</option>
              <option value="closed">クローズ</option>
              <option value="rejected">却下</option>
            </select>
          </label>
        </div>
        <div id="challenges-area"><div class="loading">読み込み中…</div></div>
      </section>

      <!-- プロンプト修正 -->
      <section class="card admin-view" id="view-prompts" style="display:none;">
        <h2>プロンプト修正</h2>
        <p style="font-size:13px; color:#666;">問題生成の追加指示です。出題の骨組み（JSON形式）は固定のまま、ここに書いた方針が生成時に反映されます。空欄なら既定の動作になります。</p>
        <div style="display:flex; flex-direction:column; gap:18px; margin-top:12px;">
          <div>
            <h3 style="margin:0 0 6px;">質問（問題文・選択肢）への追加指示</h3>
            <textarea id="prompt-question" rows="8" style="width:100%; box-sizing:border-box; font-size:13px;" placeholder="例：選択肢は紛らわしくし、数値や条件を1つだけ変えた誤答を混ぜる。"></textarea>
          </div>
          <div>
            <h3 style="margin:0 0 6px;">回答（解説）への追加指示</h3>
            <textarea id="prompt-answer" rows="8" style="width:100%; box-sizing:border-box; font-size:13px;" placeholder="例：解説は2文以内で簡潔に。専門用語には短い補足を付ける。"></textarea>
          </div>
          <div style="display:flex; gap:12px; align-items:center;">
            <button type="button" id="prompt-save-btn" class="btn btn-primary" style="padding:8px 16px;">保存する</button>
            <span id="prompt-save-status" style="font-size:13px;"></span>
          </div>
        </div>
      </section>
    </main>

    <div id="error-area" class="card" style="display:none;">
      <h2>読み込みエラー</h2>
      <p id="error-message"></p>
    </div>
  </div>

  <script src="/assets/common.js?v=1.12.1"></script>
  <script src="/assets/admin.js"></script>
<footer style="display: flex; padding: 8px; font-size: 12px; border-top: 1px solid #eee;"></footer>
</body>
</html>
